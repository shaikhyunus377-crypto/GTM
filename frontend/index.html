<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Scraper Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; }
    .drop-zone { border: 2px dashed #475569; transition: all 0.2s; }
    .drop-zone.drag-over { border-color: #6366f1; background: #1e1b4b; }
    .status-pending  { color: #94a3b8; }
    .status-running  { color: #fbbf24; }
    .status-done     { color: #34d399; }
    .status-error    { color: #f87171; }
    .progress-bar { transition: width 0.4s ease; }
    ::-webkit-scrollbar { width: 6px; } 
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    .thumb-img { width: 80px; height: 50px; object-fit: cover; border-radius: 4px; cursor: pointer; border: 1px solid #475569; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; display: flex; align-items: center; justify-content: center; }
    .modal-img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }
    .spinner { border: 2px solid #334155; border-top-color: #6366f1; border-radius: 50%; width: 16px; height: 16px; animation: spin 0.7s linear infinite; display: inline-block; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen">

<!-- Header -->
<div class="px-6 py-4 border-b border-slate-700 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-sm">S</div>
    <h1 class="text-lg font-semibold text-white">Web Scraper Dashboard</h1>
  </div>
  <div id="apiStatus" class="text-xs px-3 py-1 rounded-full bg-slate-700 text-slate-400">Checking API...</div>
</div>

<div class="max-w-7xl mx-auto px-6 py-8 space-y-6">

  <!-- Config row -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    <div class="card p-4">
      <label class="block text-xs text-slate-400 mb-1">Backend URL</label>
      <input id="apiUrl" type="text" value="https://gtm-production-8ae5.up.railway.app"
        class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500" />
    </div>
    <div class="card p-4">
      <label class="block text-xs text-slate-400 mb-1">Mode</label>
      <div class="flex gap-2 mt-1">
        <button id="btnSequential" onclick="setMode('sequential')"
          class="flex-1 py-2 rounded-lg text-sm font-medium bg-indigo-600 text-white">Sequential</button>
        <button id="btnParallel" onclick="setMode('parallel')"
          class="flex-1 py-2 rounded-lg text-sm font-medium bg-slate-700 text-slate-300">Parallel</button>
      </div>
    </div>
    <div class="card p-4">
      <label class="block text-xs text-slate-400 mb-1">Parallel workers (max)</label>
      <input id="workerCount" type="number" value="3" min="1" max="10"
        class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500" />
    </div>
  </div>

  <!-- Upload -->
  <div id="dropZone" class="drop-zone card p-10 text-center cursor-pointer"
    onclick="document.getElementById('fileInput').click()"
    ondragover="event.preventDefault();this.classList.add('drag-over')"
    ondragleave="this.classList.remove('drag-over')"
    ondrop="handleDrop(event)">
    <div class="text-4xl mb-3">📂</div>
    <p class="text-white font-medium">Drop Excel / CSV file here or click to browse</p>
    <p class="text-slate-400 text-sm mt-1">Supports .xlsx, .xls, .csv — any columns, URLs auto-detected</p>
    <input id="fileInput" type="file" accept=".xlsx,.xls,.csv" class="hidden" onchange="handleFile(this.files[0])" />
  </div>

  <!-- URL table -->
  <div id="urlSection" class="hidden">
    <div class="flex items-center justify-between mb-3">
      <div>
        <h2 class="text-white font-semibold" id="urlHeading">URLs detected</h2>
        <p class="text-slate-400 text-xs mt-0.5" id="urlSubheading"></p>
      </div>
      <div class="flex gap-2">
        <button onclick="selectAll()" class="text-xs px-3 py-1.5 rounded-lg bg-slate-700 hover:bg-slate-600 text-slate-300">Select all</button>
        <button onclick="selectNone()" class="text-xs px-3 py-1.5 rounded-lg bg-slate-700 hover:bg-slate-600 text-slate-300">Deselect all</button>
        <button id="runBtn" onclick="runScraping()"
          class="px-5 py-1.5 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium">Run Scraper</button>
      </div>
    </div>

    <!-- Overall progress -->
    <div id="overallProgress" class="hidden card p-4 mb-4">
      <div class="flex justify-between text-sm mb-2">
        <span class="text-slate-300" id="progressLabel">Running...</span>
        <span class="text-slate-400" id="progressCount">0 / 0</span>
      </div>
      <div class="h-2 bg-slate-700 rounded-full overflow-hidden">
        <div id="progressBar" class="progress-bar h-full bg-indigo-500 rounded-full" style="width:0%"></div>
      </div>
    </div>

    <!-- Table -->
    <div class="card overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-slate-700">
              <th class="px-4 py-3 text-left w-8"><input type="checkbox" id="checkAll" onchange="toggleAll(this)" class="rounded" /></th>
              <th class="px-4 py-3 text-left text-slate-400 font-medium">#</th>
              <th class="px-4 py-3 text-left text-slate-400 font-medium">URL</th>
              <th class="px-4 py-3 text-left text-slate-400 font-medium">Status</th>
              <th class="px-4 py-3 text-left text-slate-400 font-medium">Elements</th>
              <th class="px-4 py-3 text-left text-slate-400 font-medium">Screenshot</th>
            </tr>
          </thead>
          <tbody id="urlTableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Export -->
    <div class="flex justify-end mt-3">
      <button onclick="exportResults()" class="text-xs px-4 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 text-slate-300">Export results CSV</button>
    </div>
  </div>

</div>

<!-- Screenshot modal -->
<div id="modal" class="modal-overlay hidden" onclick="closeModal()">
  <img id="modalImg" class="modal-img" src="" alt="Screenshot" onclick="event.stopPropagation()" />
</div>

<script>
let mode = 'sequential';
let urls = [];        // [{url, rowData, idx}]
let results = {};     // url -> result obj
let running = false;

// ── API health check ──────────────────────────────────────────────────────────
function checkApi() {
  const base = document.getElementById('apiUrl').value.trim().replace(/\/$/, '');
  fetch(base + '/')
    .then(r => r.json())
    .then(d => {
      const el = document.getElementById('apiStatus');
      if (d.status === 'ok') {
        el.textContent = 'API online';
        el.className = 'text-xs px-3 py-1 rounded-full bg-green-900 text-green-400';
      }
    })
    .catch(() => {
      const el = document.getElementById('apiStatus');
      el.textContent = 'API offline';
      el.className = 'text-xs px-3 py-1 rounded-full bg-red-900 text-red-400';
    });
}
document.getElementById('apiUrl').addEventListener('change', checkApi);
checkApi();

// ── Mode toggle ───────────────────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.getElementById('btnSequential').className =
    'flex-1 py-2 rounded-lg text-sm font-medium ' + (m === 'sequential' ? 'bg-indigo-600 text-white' : 'bg-slate-700 text-slate-300');
  document.getElementById('btnParallel').className =
    'flex-1 py-2 rounded-lg text-sm font-medium ' + (m === 'parallel' ? 'bg-indigo-600 text-white' : 'bg-slate-700 text-slate-300');
}

// ── File handling ─────────────────────────────────────────────────────────────
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('drag-over');
  handleFile(e.dataTransfer.files[0]);
}

function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const wb = XLSX.read(e.target.result, {type: 'binary'});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, {header: 1, defval: ''});
    processRows(rows, file.name);
  };
  reader.readAsBinaryString(file);
}

function isUrl(val) {
  return typeof val === 'string' && (val.startsWith('http://') || val.startsWith('https://'));
}

function processRows(rows, filename) {
  if (!rows.length) { alert('File is empty.'); return; }

  // Find URL columns
  const headers = rows[0];
  const urlColIndices = [];
  headers.forEach((h, i) => {
    // Check first 10 data rows for URLs in this column
    let urlCount = 0;
    for (let r = 1; r < Math.min(rows.length, 11); r++) {
      if (isUrl(rows[r][i])) urlCount++;
    }
    if (urlCount > 0) urlColIndices.push(i);
  });

  // If no URL column found by header scan, scan all cells
  urls = [];
  if (urlColIndices.length > 0) {
    rows.slice(1).forEach((row, ri) => {
      urlColIndices.forEach(ci => {
        const val = row[ci];
        if (isUrl(val)) urls.push({url: val.trim(), rowData: row, idx: urls.length});
      });
    });
  } else {
    // Fallback: collect any cell that looks like a URL
    rows.slice(1).forEach(row => {
      row.forEach(cell => {
        if (isUrl(cell)) urls.push({url: cell.trim(), rowData: row, idx: urls.length});
      });
    });
  }

  // Deduplicate
  const seen = new Set();
  urls = urls.filter(u => { if (seen.has(u.url)) return false; seen.add(u.url); return true; });
  urls.forEach((u, i) => u.idx = i);

  results = {};

  const section = document.getElementById('urlSection');
  section.classList.remove('hidden');
  document.getElementById('urlHeading').textContent = `${urls.length} URL${urls.length !== 1 ? 's' : ''} found`;
  document.getElementById('urlSubheading').textContent = `From: ${filename}`;
  renderTable();
}

// ── Table rendering ───────────────────────────────────────────────────────────
function renderTable() {
  const tbody = document.getElementById('urlTableBody');
  tbody.innerHTML = '';
  urls.forEach((u, i) => {
    const r = results[u.url] || {};
    const status = r.status || 'pending';
    const statusClass = `status-${status}`;
    const statusLabel = {
      pending: 'Pending',
      running: '<span class="spinner"></span>Running',
      done: 'Done',
      error: 'Error',
    }[status] || 'Pending';

    const elements = r.dom_summary ? r.dom_summary.total_elements : '—';
    const thumb = r.screenshot_b64
      ? `<img class="thumb-img" src="data:image/png;base64,${r.screenshot_b64}" onclick="openModal('${u.url}')" title="Click to enlarge" />`
      : (status === 'done' ? '<span class="text-slate-500 text-xs">No screenshot</span>' : '—');
    const errorMsg = r.error ? `<span class="text-red-400 text-xs block mt-1" title="${r.error}">${r.error.substring(0,60)}...</span>` : '';

    const row = document.createElement('tr');
    row.id = `row-${i}`;
    row.className = 'border-b border-slate-800 hover:bg-slate-800/40';
    row.innerHTML = `
      <td class="px-4 py-3"><input type="checkbox" class="url-check rounded" data-idx="${i}" checked /></td>
      <td class="px-4 py-3 text-slate-400">${i + 1}</td>
      <td class="px-4 py-3 max-w-xs">
        <a href="${u.url}" target="_blank" class="text-indigo-400 hover:underline text-xs break-all">${u.url}</a>
      </td>
      <td class="px-4 py-3 ${statusClass} text-xs">${statusLabel}${errorMsg}</td>
      <td class="px-4 py-3 text-slate-300">${elements}</td>
      <td class="px-4 py-3">${thumb}</td>
    `;
    tbody.appendChild(row);
  });
}

function updateRow(idx) {
  const u = urls[idx];
  const r = results[u.url] || {};
  const status = r.status || 'pending';
  const statusClass = `status-${status}`;
  const statusLabel = {
    pending: 'Pending',
    running: '<span class="spinner"></span>Running',
    done: 'Done',
    error: 'Error',
  }[status];
  const row = document.getElementById(`row-${idx}`);
  if (!row) return;
  row.cells[3].className = `px-4 py-3 ${statusClass} text-xs`;
  row.cells[3].innerHTML = statusLabel + (r.error ? `<span class="text-red-400 text-xs block mt-1" title="${r.error}">${r.error.substring(0,60)}</span>` : '');
  row.cells[4].textContent = r.dom_summary ? r.dom_summary.total_elements : '—';
  if (r.screenshot_b64) {
    row.cells[5].innerHTML = `<img class="thumb-img" src="data:image/png;base64,${r.screenshot_b64}" onclick="openModal('${u.url}')" title="Click to enlarge" />`;
  } else if (status === 'done') {
    row.cells[5].innerHTML = '<span class="text-slate-500 text-xs">No screenshot</span>';
  }
}

// ── Scraping ──────────────────────────────────────────────────────────────────
function getSelectedUrls() {
  return [...document.querySelectorAll('.url-check:checked')].map(cb => urls[parseInt(cb.dataset.idx)]);
}

async function runScraping() {
  if (running) return;
  const selected = getSelectedUrls();
  if (!selected.length) { alert('Select at least one URL.'); return; }
  running = true;
  document.getElementById('runBtn').disabled = true;
  document.getElementById('runBtn').textContent = 'Running...';
  document.getElementById('overallProgress').classList.remove('hidden');

  let done = 0;
  const total = selected.length;
  const updateProgress = () => {
    done++;
    document.getElementById('progressCount').textContent = `${done} / ${total}`;
    document.getElementById('progressBar').style.width = `${Math.round(done/total*100)}%`;
    document.getElementById('progressLabel').textContent = done === total ? 'Complete!' : 'Running...';
  };

  if (mode === 'sequential') {
    for (const u of selected) {
      await scrapeOne(u);
      updateProgress();
    }
  } else {
    const workers = parseInt(document.getElementById('workerCount').value) || 3;
    const queue = [...selected];
    const runWorker = async () => {
      while (queue.length) {
        const u = queue.shift();
        await scrapeOne(u);
        updateProgress();
      }
    };
    const pool = Array.from({length: Math.min(workers, selected.length)}, runWorker);
    await Promise.all(pool);
  }

  running = false;
  document.getElementById('runBtn').disabled = false;
  document.getElementById('runBtn').textContent = 'Run Scraper';
}

async function scrapeOne(u) {
  const base = document.getElementById('apiUrl').value.trim().replace(/\/$/, '');
  results[u.url] = {status: 'running'};
  updateRow(u.idx);
  try {
    const resp = await fetch(base + '/scrape', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({url: u.url}),
    });
    const data = await resp.json();
    if (data.error) {
      results[u.url] = {status: 'error', error: data.error};
    } else {
      results[u.url] = {...data, status: 'done'};
    }
  } catch (err) {
    results[u.url] = {status: 'error', error: err.message};
  }
  updateRow(u.idx);
}

// ── Select all / none ─────────────────────────────────────────────────────────
function selectAll() { document.querySelectorAll('.url-check').forEach(cb => cb.checked = true); }
function selectNone() { document.querySelectorAll('.url-check').forEach(cb => cb.checked = false); }
function toggleAll(master) { document.querySelectorAll('.url-check').forEach(cb => cb.checked = master.checked); }

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(url) {
  const r = results[url];
  if (!r || !r.screenshot_b64) return;
  document.getElementById('modalImg').src = 'data:image/png;base64,' + r.screenshot_b64;
  document.getElementById('modal').classList.remove('hidden');
}
function closeModal() { document.getElementById('modal').classList.add('hidden'); }

// ── Export CSV ────────────────────────────────────────────────────────────────
function exportResults() {
  const rows = [['#','URL','Status','Elements','Error']];
  urls.forEach((u, i) => {
    const r = results[u.url] || {};
    rows.push([i+1, u.url, r.status||'pending', r.dom_summary?.total_elements||'', r.error||'']);
  });
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'scrape_results.csv';
  a.click();
}
</script>
</body>
</html>
